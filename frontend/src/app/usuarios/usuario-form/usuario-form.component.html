<div class="fade-in">
  <div class="page-header">
    <h2>{{ isEditing ? 'Editar Usuario' : 'Nuevo Usuario' }}</h2>
    <button mat-stroked-button (click)="cancel()">
      <mat-icon>arrow_back</mat-icon>
      Volver
    </button>
  </div>

  <div class="loading-overlay" *ngIf="loadingData">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <mat-card *ngIf="!loadingData" class="col-md-6">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Nombre Completo</mat-label>
          <input matInput formControlName="nombre" placeholder="Nombre del usuario">
          <mat-error *ngIf="form.get('nombre')?.hasError('required')">Requerido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Correo Electrónico</mat-label>
          <input matInput type="email" formControlName="email" placeholder="email@ejemplo.com">
          <mat-error *ngIf="form.get('email')?.hasError('required')">Requerido</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Email inválido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Rol</mat-label>
          <mat-select formControlName="rolNombre">
            <mat-option *ngFor="let r of roles" [value]="r">{{ r }}</mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('rolNombre')?.hasError('required')">Selecciona un rol</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>{{ isEditing ? 'Nueva Contraseña (dejar vacío para mantener)' : 'Contraseña' }}</mat-label>
          <input matInput type="password" formControlName="password" placeholder="Contraseña">
          <mat-error *ngIf="form.get('password')?.hasError('required')">
            La contraseña es requerida
          </mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">
            Mínimo 4 caracteres
          </mat-error>
        </mat-form-field>

        <mat-slide-toggle formControlName="activo" color="primary">
          Usuario Activo
        </mat-slide-toggle>

        <div class="d-flex gap-2 justify-content-end mt-4">
          <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="loading">
            <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
            <span *ngIf="!loading">
              <mat-icon>save</mat-icon>
              {{ isEditing ? 'Guardar Cambios' : 'Crear Usuario' }}
            </span>
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
