<div class="fade-in">
  <div class="page-header">
    <h2>Usuarios</h2>
    <button mat-raised-button color="primary" (click)="navigateToNew()">
      <mat-icon>add</mat-icon>
      Nuevo Usuario
    </button>
  </div>

  <mat-card>
    <mat-card-header>
      <mat-form-field class="search-field" appearance="outline">
        <mat-label>Buscar usuarios</mat-label>
        <input matInput (keyup)="applyFilter($event)">
        <mat-icon matSuffix>search</mat-icon>
        <mat-hint>Por nombre o email</mat-hint>
      </mat-form-field>
    </mat-card-header>

    <mat-card-content>
      <div class="loading-overlay" *ngIf="loading">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <div class="table-container" *ngIf="!loading">
        <table mat-table [dataSource]="dataSource" matSort class="w-100">
          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
            <td mat-cell *matCellDef="let u" class="fw-medium">{{ u.nombre }}</td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let u">{{ u.email }}</td>
          </ng-container>

          <ng-container matColumnDef="rolNombre">
            <th mat-header-cell *matHeaderCellDef>Rol</th>
            <td mat-cell *matCellDef="let u">
              <span [class]="getRolClass(u.rolNombre)">{{ u.rolNombre }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="estado">
            <th mat-header-cell *matHeaderCellDef>Estado</th>
            <td mat-cell *matCellDef="let u">
              <span [class.badge-stock-ok]="u.activo" [class.badge-stock-low]="!u.activo">
                {{ u.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
          </ng-container>

          <ng-container matColumnDef="creado">
            <th mat-header-cell *matHeaderCellDef>Creado</th>
            <td mat-cell *matCellDef="let u">{{ u.fechaCreacion | date:'dd/MM/yyyy' }}</td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef class="text-end">Acciones</th>
            <td mat-cell *matCellDef="let u" class="text-end">
              <button mat-icon-button color="primary" matTooltip="Editar" (click)="navigateToEdit(u.id)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="deleteUsuario(u)">
                <mat-icon>close</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <div class="empty-state" *ngIf="dataSource.filteredData.length === 0 && !loading">
          <mat-icon>manage_accounts</mat-icon>
          <p>No se encontraron usuarios</p>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
