<div class="login-wrapper">
  <!-- Decorative ambient blobs for glassmorphism depth -->
  <div class="ambient-blob blob-1" aria-hidden="true"></div>
  <div class="ambient-blob blob-2" aria-hidden="true"></div>
  <div class="ambient-blob blob-3" aria-hidden="true"></div>

  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="login-logo" aria-hidden="true">
        <mat-icon>hardware</mat-icon>
      </div>
      <h1 class="login-title">FerrePlus</h1>
      <p class="login-subtitle">Sistema de Inventarios</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Error message -->
      <div class="error-alert" *ngIf="errorMessage">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Email -->
      <mat-form-field appearance="outline" class="login-field">
        <mat-label>Correo Electrónico</mat-label>
        <mat-icon matPrefix>email</mat-icon>
        <input
          matInput
          type="email"
          formControlName="email"
          placeholder="tu@correo.com"
          autocomplete="email">
        <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
          El correo es requerido
        </mat-error>
        <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
          Ingresa un correo válido
        </mat-error>
      </mat-form-field>

      <!-- Password -->
      <mat-form-field appearance="outline" class="login-field">
        <mat-label>Contraseña</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          placeholder="Ingresa tu contraseña"
          autocomplete="current-password">
        <button
          type="button"
          mat-icon-button
          matSuffix
          (click)="hidePassword = !hidePassword"
          [attr.aria-label]="hidePassword ? 'Mostrar contraseña' : 'Ocultar contraseña'"
          class="visibility-toggle">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          La contraseña es requerida
        </mat-error>
        <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
          Mínimo 4 caracteres
        </mat-error>
      </mat-form-field>

      <!-- Submit -->
      <button
        mat-raised-button
        color="primary"
        class="login-btn"
        type="submit"
        [disabled]="loginForm.invalid || loading">
        <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
        <span class="btn-content" *ngIf="!loading">
          <mat-icon>login</mat-icon>
          Iniciar Sesión
        </span>
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>&copy; 2026 FerrePlus. Todos los derechos reservados.</p>
    </div>
  </div>
</div>
