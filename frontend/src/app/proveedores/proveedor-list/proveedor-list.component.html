<div class="fade-in">
  <div class="page-header">
    <h2>Proveedores</h2>
    <button mat-raised-button color="primary" (click)="navigateToNew()">
      <mat-icon>add</mat-icon>
      Nuevo Proveedor
    </button>
  </div>

  <mat-card>
    <mat-card-header>
      <mat-form-field class="search-field" appearance="outline">
        <mat-label>Buscar proveedores</mat-label>
        <input matInput (keyup)="applyFilter($event)">
        <mat-icon matSuffix>search</mat-icon>
        <mat-hint>Por nombre o RUC</mat-hint>
      </mat-form-field>
    </mat-card-header>

    <mat-card-content>
      <div class="loading-overlay" *ngIf="loading">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <div class="table-container" *ngIf="!loading">
        <table mat-table [dataSource]="dataSource" matSort class="w-100">
          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
            <td mat-cell *matCellDef="let p" class="fw-medium">{{ p.nombre }}</td>
          </ng-container>

          <ng-container matColumnDef="contacto">
            <th mat-header-cell *matHeaderCellDef>Contacto</th>
            <td mat-cell *matCellDef="let p">{{ p.contacto }}</td>
          </ng-container>

          <ng-container matColumnDef="telefono">
            <th mat-header-cell *matHeaderCellDef>Teléfono</th>
            <td mat-cell *matCellDef="let p">{{ p.telefono }}</td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let p">{{ p.email }}</td>
          </ng-container>

          <ng-container matColumnDef="ruc">
            <th mat-header-cell *matHeaderCellDef>RUC</th>
            <td mat-cell *matCellDef="let p">{{ p.ruc }}</td>
          </ng-container>

          <ng-container matColumnDef="estado">
            <th mat-header-cell *matHeaderCellDef>Estado</th>
            <td mat-cell *matCellDef="let p">
              <span [class.badge-stock-ok]="p.activo" [class.badge-stock-low]="!p.activo">
                {{ p.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef class="text-end">Acciones</th>
            <td mat-cell *matCellDef="let p" class="text-end">
              <button mat-icon-button color="primary" matTooltip="Editar" (click)="navigateToEdit(p.id)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="deleteProveedor(p)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <div class="empty-state" *ngIf="dataSource.filteredData.length === 0 && !loading">
          <mat-icon>local_shipping</mat-icon>
          <p>No se encontraron proveedores</p>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
