<div class="app-layout">
  <!-- Sidebar -->
  <app-sidebar
    *ngIf="isLoggedIn"
    [collapsed]="sidebarCollapsed"
    (toggleSidebar)="toggleSidebar()">
  </app-sidebar>

  <!-- Main Content -->
  <div class="main-content" [class.sidebar-collapsed]="sidebarCollapsed">
    <!-- Header -->
    <app-header
      *ngIf="isLoggedIn"
      [collapsed]="sidebarCollapsed"
      (toggleSidebar)="toggleSidebar()"
      (logout)="logout()">
    </app-header>

    <!-- Content -->
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
