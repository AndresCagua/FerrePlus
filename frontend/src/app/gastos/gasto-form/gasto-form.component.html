<div class="fade-in">
  <div class="page-header">
    <h2>{{ isEditing ? 'Editar Gasto' : 'Nuevo Gasto' }}</h2>
    <button mat-stroked-button (click)="cancel()">
      <mat-icon>arrow_back</mat-icon>
      Volver
    </button>
  </div>

  <div class="loading-overlay" *ngIf="loadingData">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <mat-card *ngIf="!loadingData" class="col-md-6">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Descripción</mat-label>
          <input matInput formControlName="descripcion" placeholder="Descripción del gasto">
          <mat-error *ngIf="form.get('descripcion')?.hasError('required')">Requerido</mat-error>
        </mat-form-field>

        <div class="row g-3">
          <div class="col-md-6">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Monto</mat-label>
              <input matInput type="number" formControlName="monto" min="0.01" step="0.01">
              <span matTextPrefix>$</span>
              <mat-error *ngIf="form.get('monto')?.hasError('required')">Requerido</mat-error>
              <mat-error *ngIf="form.get('monto')?.hasError('min')">Debe ser mayor a 0</mat-error>
            </mat-form-field>
          </div>

          <div class="col-md-6">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Categoría</mat-label>
              <mat-select formControlName="categoria">
                <mat-option *ngFor="let c of categorias" [value]="c">{{ c }}</mat-option>
              </mat-select>
            </mat-form-field>
          </div>
        </div>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Método de Pago</mat-label>
          <mat-select formControlName="metodoPago">
            <mat-option value="EFECTIVO">Efectivo</mat-option>
            <mat-option value="TARJETA">Tarjeta</mat-option>
            <mat-option value="TRANSFERENCIA">Transferencia</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Observación (opcional)</mat-label>
          <textarea matInput formControlName="observaciones" rows="2"></textarea>
        </mat-form-field>

        <div class="d-flex gap-2 justify-content-end mt-3">
          <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="loading">
            <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
            <span *ngIf="!loading">
              <mat-icon>save</mat-icon>
              {{ isEditing ? 'Guardar Cambios' : 'Registrar Gasto' }}
            </span>
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
