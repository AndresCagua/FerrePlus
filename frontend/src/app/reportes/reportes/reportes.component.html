<div class="fade-in">
  <div class="page-header">
    <h2>Reportes</h2>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Fecha Inicio</mat-label>
        <input matInput [matDatepicker]="pickerFrom" formControlName="fechaInicio">
        <mat-datepicker-toggle matSuffix [for]="pickerFrom"></mat-datepicker-toggle>
        <mat-datepicker #pickerFrom></mat-datepicker>
      </mat-form-field>
    </div>
    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Fecha Fin</mat-label>
        <input matInput [matDatepicker]="pickerTo" formControlName="fechaFin">
        <mat-datepicker-toggle matSuffix [for]="pickerTo"></mat-datepicker-toggle>
        <mat-datepicker #pickerTo></mat-datepicker>
      </mat-form-field>
    </div>
  </div>

  <div class="d-flex gap-2 mb-4">
    <button mat-raised-button [color]="reportType === 'ventas' ? 'primary' : ''" (click)="setReportType('ventas')">
      <mat-icon>trending_up</mat-icon>
      Ventas
    </button>
    <button mat-raised-button [color]="reportType === 'top-productos' ? 'primary' : ''" (click)="setReportType('top-productos')">
      <mat-icon>star</mat-icon>
      Top Productos
    </button>
    <button mat-raised-button color="accent" (click)="loadReport()">
      <mat-icon>refresh</mat-icon>
      Actualizar
    </button>
  </div>

  <div class="loading-overlay" *ngIf="loadingReport">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loadingReport">
    <!-- Ventas Chart -->
    <mat-card *ngIf="reportType === 'ventas'" class="mb-4">
      <mat-card-header>
        <mat-card-title>Ventas por Día</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container" *ngIf="ventasChartData.labels?.length">
          <canvas baseChart [data]="ventasChartData" [options]="ventasChartOptions" type="bar"></canvas>
        </div>
        <div class="empty-state" *ngIf="!ventasChartData.labels?.length">
          <mat-icon>show_chart</mat-icon>
          <p>No hay datos disponibles para el periodo seleccionado</p>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Top Productos Chart -->
    <mat-card *ngIf="reportType === 'top-productos'">
      <mat-card-header>
        <mat-card-title>Top Productos Más Vendidos</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container" *ngIf="topProductos.length > 0">
          <canvas baseChart [data]="ventasChartData" [options]="ventasChartOptions" type="bar"></canvas>
        </div>
        <div class="empty-state" *ngIf="topProductos.length === 0">
          <mat-icon>star_border</mat-icon>
          <p>No hay datos de productos vendidos</p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
