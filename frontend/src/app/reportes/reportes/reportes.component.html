<div class="reportes-container fade-in">
  <!-- Header -->
  <div class="reportes-header">
    <h2>Reportes</h2>
    <p class="text-muted">Genera y visualiza reportes de ventas, productos y más</p>
  </div>

  <!-- Filtros -->
  <mat-card class="filtros-card">
    <mat-card-header>
      <mat-card-title>
        <mat-icon>filter_alt</mat-icon>
        Filtros
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="filtros-row" [formGroup]="form">
        <mat-form-field appearance="outline">
          <mat-label>Fecha inicio</mat-label>
          <input matInput [matDatepicker]="pickerFrom" formControlName="desde">
          <mat-datepicker-toggle matSuffix [for]="pickerFrom"></mat-datepicker-toggle>
          <mat-datepicker #pickerFrom></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Fecha fin</mat-label>
          <input matInput [matDatepicker]="pickerTo" formControlName="hasta">
          <mat-datepicker-toggle matSuffix [for]="pickerTo"></mat-datepicker-toggle>
          <mat-datepicker #pickerTo></mat-datepicker>
        </mat-form-field>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Acciones -->
  <div class="acciones-row">
    <button
      mat-raised-button
      [color]="reportType === 'ventas' ? 'primary' : 'accent'"
      (click)="setReportType('ventas')">
      <mat-icon>trending_up</mat-icon>
      <span>Ventas por Día</span>
    </button>
    <button
      mat-raised-button
      [color]="reportType === 'top-productos' ? 'primary' : 'accent'"
      (click)="setReportType('top-productos')">
      <mat-icon>star</mat-icon>
      <span>Top Productos</span>
    </button>
    <button
      mat-stroked-button
      color="primary"
      (click)="loadReport()"
      [disabled]="loadingReport">
      <mat-icon>refresh</mat-icon>
      <span>Actualizar</span>
    </button>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" *ngIf="loadingReport">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <!-- Resultados -->
  <div class="resultados-area" *ngIf="!loadingReport">
    <!-- Ventas Chart -->
    <ng-container *ngIf="reportType === 'ventas'">
      <div class="resultado-card" *ngIf="ventasChartData.labels?.length; else emptyState">
        <div class="resultado-header">
          <h3>
            <mat-icon>bar_chart</mat-icon>
            Ventas por Día
          </h3>
        </div>
        <div class="chart-container">
          <canvas baseChart [data]="ventasChartData" [options]="ventasChartOptions" type="bar"></canvas>
        </div>
      </div>
    </ng-container>

    <!-- Top Productos Chart -->
    <ng-container *ngIf="reportType === 'top-productos'">
      <div class="resultado-card" *ngIf="topProductos.length > 0; else emptyState">
        <div class="resultado-header">
          <h3>
            <mat-icon>bar_chart</mat-icon>
            Top Productos Más Vendidos
          </h3>
        </div>
        <div class="chart-container">
          <canvas baseChart [data]="ventasChartData" [options]="ventasChartOptions" type="bar"></canvas>
        </div>
      </div>
    </ng-container>

    <!-- Empty State -->
    <ng-template #emptyState>
      <div class="estado-vacio">
        <mat-icon class="empty-icon">assessment</mat-icon>
        <p class="empty-text">No hay datos disponibles para el período seleccionado</p>
        <span class="empty-hint">Ajusta los filtros y selecciona un reporte para generar</span>
      </div>
    </ng-template>
  </div>
</div>
