<div class="fade-in">
  <div class="page-header">
    <h2>{{ isEditing ? 'Editar Categoría' : 'Nueva Categoría' }}</h2>
    <button mat-stroked-button (click)="cancel()">
      <mat-icon>arrow_back</mat-icon>
      Volver
    </button>
  </div>

  <div class="loading-overlay" *ngIf="loadingData">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <mat-card *ngIf="!loadingData" class="col-md-6">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="row g-3">
          <div class="col-12">
            <mat-form-field appearance="outline">
              <mat-label>Nombre</mat-label>
              <input matInput formControlName="nombre" placeholder="Nombre de la categoría">
              <mat-error *ngIf="form.get('nombre')?.hasError('required')">
                El nombre es requerido
              </mat-error>
              <mat-error *ngIf="form.get('nombre')?.hasError('maxlength')">
                Máximo 100 caracteres
              </mat-error>
            </mat-form-field>
          </div>

          <div class="col-12">
            <mat-form-field appearance="outline">
              <mat-label>Descripción</mat-label>
              <textarea matInput formControlName="descripcion" rows="3" placeholder="Descripción opcional"></textarea>
              <mat-hint align="end">{{ form.get('descripcion')?.value?.length || 0 }}/255</mat-hint>
            </mat-form-field>
          </div>

          <div class="col-12">
            <mat-slide-toggle formControlName="activo" color="primary">
              Categoría Activa
            </mat-slide-toggle>
          </div>
        </div>

        <div class="d-flex gap-2 justify-content-end mt-4">
          <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="loading">
            <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
            <span *ngIf="!loading">
              <mat-icon>save</mat-icon>
              {{ isEditing ? 'Guardar Cambios' : 'Crear Categoría' }}
            </span>
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
