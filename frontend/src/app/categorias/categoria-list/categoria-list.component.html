<div class="fade-in">
  <div class="page-header">
    <h2>Categorías</h2>
    <button mat-raised-button color="primary" (click)="navigateToNew()">
      <mat-icon>add</mat-icon>
      Nueva Categoría
    </button>
  </div>

  <mat-card>
    <mat-card-header>
      <mat-form-field class="search-field" appearance="outline">
        <mat-label>Buscar categorías</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Nombre...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </mat-card-header>

    <mat-card-content>
      <div class="loading-overlay" *ngIf="loading">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <div class="table-container" *ngIf="!loading">
        <table mat-table [dataSource]="dataSource" matSort class="w-100">
          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
            <td mat-cell *matCellDef="let c" class="fw-medium">{{ c.nombre }}</td>
          </ng-container>

          <ng-container matColumnDef="descripcion">
            <th mat-header-cell *matHeaderCellDef>Descripción</th>
            <td mat-cell *matCellDef="let c">{{ c.descripcion || '-' }}</td>
          </ng-container>

          <ng-container matColumnDef="activo">
            <th mat-header-cell *matHeaderCellDef>Estado</th>
            <td mat-cell *matCellDef="let c">
              <span [class.badge-stock-ok]="c.activo" [class.badge-stock-low]="!c.activo">
                {{ c.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef class="text-end">Acciones</th>
            <td mat-cell *matCellDef="let c" class="text-end">
              <button mat-icon-button color="primary" matTooltip="Editar" (click)="navigateToEdit(c.id)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="deleteCategoria(c)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <div class="empty-state" *ngIf="dataSource.filteredData.length === 0 && !loading">
          <mat-icon>category</mat-icon>
          <p>No se encontraron categorías</p>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
