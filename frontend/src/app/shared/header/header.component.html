<header class="app-header">
  <div class="header-left">
    <button class="menu-toggle" mat-icon-button (click)="onToggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="page-title">
      <ng-container *ngIf="authService.getCurrentUser()">
        {{ authService.getCurrentUser()?.nombre }}
      </ng-container>
    </span>
  </div>

  <div class="header-right">
    <button mat-icon-button class="theme-toggle" (click)="themeService.toggle()" matTooltip="Cambiar tema">
      <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-button">
      <mat-icon>account_circle</mat-icon>
      <span class="user-name">{{ authService.getCurrentUser()?.nombre || 'Usuario' }}</span>
      <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu" xPosition="before">
      <button mat-menu-item disabled>
        <mat-icon>person</mat-icon>
        <span>{{ authService.getCurrentUser()?.nombre }}</span>
      </button>
      <button mat-menu-item disabled>
        <mat-icon>badge</mat-icon>
        <span>{{ authService.getCurrentUser()?.rol }}</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()">
        <mat-icon color="warn">logout</mat-icon>
        <span>Cerrar Sesión</span>
      </button>
    </mat-menu>
  </div>
</header>
